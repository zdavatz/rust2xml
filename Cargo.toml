[package]
name = "rust2xml"
version = "3.1.5"
edition = "2021"
rust-version = "1.75"
description = "Swiss drug database XML/DAT generator â creates files from swissINDEX, BAG-XML/FHIR and Swissmedic"
license = "GPL-3.0-only"
authors = [
    "Yasuhiro Asaka <yasaka@ywesee.com>",
    "Zeno R.R. Davatz <zdavatz@ywesee.com>",
    "Niklaus Giger <ngiger@ywesee.com>",
]
homepage = "https://github.com/zdavatz/rust2xml"
repository = "https://github.com/zdavatz/rust2xml"

[[bin]]
name = "rust2xml"
path = "src/bin/rust2xml.rs"

[[bin]]
name = "compare_v5"
path = "src/bin/compare_v5.rs"

[[bin]]
name = "check_artikelstamm"
path = "src/bin/check_artikelstamm.rs"

[[bin]]
name = "rust2xml-gui"
path = "src/bin/rust2xml-gui.rs"

[lib]
name = "rust2xml"
path = "src/lib.rs"

[dependencies]
# CLI â replaces `optimist`
clap = { version = "4.5", features = ["derive"] }

# HTTP / downloads â replaces `mechanize` + `open-uri` + `rest-client`
reqwest = { version = "0.12", features = ["blocking", "cookies", "native-tls", "gzip", "json", "stream"], default-features = false }
tokio = { version = "1", features = ["full"] }

# FTP â for ZurRose transfer.dat (pillbox.oddb.org)
suppaftp = { version = "6", features = ["native-tls"] }

# HTML scraping â replaces Nokogiri's HTML parsing in SwissmedicDownloader + chapter_70_hack
scraper = "0.20"
html-escape = "0.2"

# XML â replaces `nokogiri`, `sax-machine`, `ox`, `xml-simple`, `rexml`
quick-xml = { version = "0.36", features = ["serialize"] }
serde = { version = "1", features = ["derive"] }
serde-xml-rs = "0.6"

# JSON / NDJSON â for FHIR support
serde_json = "1"

# CSV â epha interactions, firstbase, oddb_calc
csv = "1.3"

# Excel â replaces `rubyXL` (.xlsx) + `spreadsheet` (.xls) via a single crate
calamine = "0.26"

# ZIP â replaces `rubyzip`
zip = { version = "2", default-features = false, features = ["deflate", "time"] }

# tar.gz â replaces `minitar`
tar = "0.4"
flate2 = "1"

# YAML â for galenic-group / override tables used by calc.rb + builder.rb
serde_yaml = "0.9"

# Char encoding â ISO-8859-1 / ISO-8859-14 (ZurRose transfer.dat) / UTF-8
encoding_rs = "0.8"
encoding_rs_io = "0.1"

# SHA256 â top-element hashing in output XMLs
sha2 = "0.10"
hex = "0.4"

# PEG parser â replaces Parslet for composition grammar
pest = "2.7"
pest_derive = "2.7"

# Regex â used throughout Ruby; mirror in Rust
regex = "1.10"
once_cell = "1.20"
lazy_static = "1.5"

# Dates â date parsing for limitation valid-thru, expiry_date, filename stamping
chrono = { version = "0.4", features = ["serde"] }

# Concurrency â port of CLI's Thread + Mutex orchestration
parking_lot = "0.12"
crossbeam-channel = "0.5"
rayon = "1.10"

# Error handling
anyhow = "1"
thiserror = "1"

# Logging â replaces Oddb2xml.log
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Filesystem helpers
tempfile = "3.13"
walkdir = "2.5"

# URL parsing
url = "2.5"

# GUI â eframe / egui for cross-platform desktop UI (rust2xml-gui binary)
eframe = { version = "0.29", default-features = false, features = ["default_fonts", "glow", "persistence", "wayland", "x11"] }
egui_extras = { version = "0.29", default-features = false }

# Embedded SQLite â bundled so no system libsqlite needed on any target
rusqlite = { version = "0.32", features = ["bundled"] }

# PNG decoder for the embedded app icon (rust2xml-gui).  Using `image`
# because eframe already pulls it in transitively.
image = { version = "0.25", default-features = false, features = ["png"] }

# Multi-resolution ICO encoder â used by the `make_ico` example to
# regenerate `assets/icon.ico` whenever `assets/icon.png` changes.
ico = "0.4"

[target.'cfg(windows)'.build-dependencies]
# Windows .exe icon embedding via build.rs.
winresource = "0.1"

[build-dependencies]
# Compile the pest grammar at build time
# (pest_derive handles this via proc-macro, no build.rs step needed)

[dev-dependencies]
# Test helpers â rspec analogues
rstest = "0.23"
pretty_assertions = "1.4"
wiremock = "0.6"
tempfile = "3.13"
serial_test = "3.1"
insta = { version = "1.41", features = ["yaml"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true
