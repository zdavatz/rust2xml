name: Release

# Fires whenever a semver tag `vX.Y.Z` is pushed.
# Typical release flow:
#
#   # in Cargo.toml, bump version 3.0.4 → 3.0.5
#   git commit -am "Release v3.0.5" && git push
#   git tag v3.0.5 && git push origin v3.0.5
#
# This workflow then builds release binaries for Linux, macOS (x86_64
# and arm64) and Windows, packages them, and attaches them to the
# GitHub Release that gets created for the tag.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v3.0.5)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Fail fast on any warning so we catch API drift before it ships.
  RUSTFLAGS: "-Dwarnings"

jobs:
  # --- First gate: library + unit tests must pass on Linux --------------
  test:
    name: cargo test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libfontconfig1-dev libgl1-mesa-dev
      - name: cargo test --all
        run: cargo test --all --release

  # --- Cross-platform build matrix --------------------------------------
  build:
    name: build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary-suffix: ""
            gui: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary-suffix: ""
            cross: true
            gui: false  # eframe cross-build needs an arm64 sysroot — not worth the complexity for v1
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
            binary-suffix: ""
            gui: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary-suffix: ""
            gui: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary-suffix: ".exe"
            gui: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # aarch64 Linux needs cross toolchain bits.
      - name: install aarch64-linux gcc
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      # eframe needs xkbcommon + fontconfig headers on Linux x86_64.
      - name: install Linux GUI build deps
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libfontconfig1-dev libgl1-mesa-dev

      - name: cargo build --release (CLI bins only)
        if: matrix.gui != true
        run: cargo build --release --target ${{ matrix.target }} --bin rust2xml --bin compare_v5 --bin check_artikelstamm

      - name: cargo build --release (CLI + GUI)
        if: matrix.gui == true
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: resolve tag / version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "stem=rust2xml-$tag-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: stage artifact contents
        shell: bash
        run: |
          mkdir -p dist/${{ steps.vars.outputs.stem }}
          cp "target/${{ matrix.target }}/release/rust2xml${{ matrix.binary-suffix }}" dist/${{ steps.vars.outputs.stem }}/
          cp "target/${{ matrix.target }}/release/compare_v5${{ matrix.binary-suffix }}" dist/${{ steps.vars.outputs.stem }}/
          cp "target/${{ matrix.target }}/release/check_artikelstamm${{ matrix.binary-suffix }}" dist/${{ steps.vars.outputs.stem }}/
          if [ "${{ matrix.gui }}" = "true" ]; then
            cp "target/${{ matrix.target }}/release/rust2xml-gui${{ matrix.binary-suffix }}" dist/${{ steps.vars.outputs.stem }}/
          fi
          cp README.md LICENSE dist/${{ steps.vars.outputs.stem }}/

      # Linux desktop integration — ship the .desktop file, the icon
      # and a tiny installer.  No-op on macOS/Windows.
      - name: stage Linux desktop integration
        if: matrix.gui == true && startsWith(matrix.target, 'x86_64-unknown-linux')
        shell: bash
        run: |
          cp assets/rust2xml-gui.desktop dist/${{ steps.vars.outputs.stem }}/
          cp assets/icon.png             dist/${{ steps.vars.outputs.stem }}/
          cp assets/install-linux.sh     dist/${{ steps.vars.outputs.stem }}/
          chmod +x                       dist/${{ steps.vars.outputs.stem }}/install-linux.sh

      # macOS .app bundle — wraps the GUI binary so Finder / Dock /
      # Spotlight pick up the icon and bundle metadata.  Generates the
      # .icns from the source PNG via the native iconutil tool.
      - name: build macOS .app bundle
        if: matrix.gui == true && contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.tag }}"
          version="${version#v}"
          stem="${{ steps.vars.outputs.stem }}"
          app="dist/${stem}/rust2xml-gui.app"
          mkdir -p "${app}/Contents/MacOS" "${app}/Contents/Resources"

          # Build the .icns from assets/icon.png.
          tmp_iconset="$(mktemp -d)/icon.iconset"
          mkdir -p "$tmp_iconset"
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" assets/icon.png --out "$tmp_iconset/icon_${size}x${size}.png" >/dev/null
            dbl=$((size * 2))
            sips -z "$dbl" "$dbl" assets/icon.png --out "$tmp_iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$tmp_iconset" -o "${app}/Contents/Resources/icon.icns"

          # Move the GUI binary into the .app and substitute the version
          # in the Info.plist template.
          mv "dist/${stem}/rust2xml-gui" "${app}/Contents/MacOS/rust2xml-gui"
          sed "s/__VERSION__/${version}/g" assets/Info.plist.template \
            > "${app}/Contents/Info.plist"
          chmod +x "${app}/Contents/MacOS/rust2xml-gui"

      - name: pack tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar czf "${{ steps.vars.outputs.stem }}.tar.gz" "${{ steps.vars.outputs.stem }}"
          # SHA-256 — same tool on every Unix runner.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ steps.vars.outputs.stem }}.tar.gz" > "${{ steps.vars.outputs.stem }}.tar.gz.sha256"
          else
            shasum -a 256 "${{ steps.vars.outputs.stem }}.tar.gz" > "${{ steps.vars.outputs.stem }}.tar.gz.sha256"
          fi

      - name: pack zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "${{ steps.vars.outputs.stem }}" -DestinationPath "${{ steps.vars.outputs.stem }}.zip"
          (Get-FileHash "${{ steps.vars.outputs.stem }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ steps.vars.outputs.stem }}.zip" | Out-File -Encoding ASCII "${{ steps.vars.outputs.stem }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.stem }}
          path: |
            dist/${{ steps.vars.outputs.stem }}.tar.gz
            dist/${{ steps.vars.outputs.stem }}.tar.gz.sha256
            dist/${{ steps.vars.outputs.stem }}.zip
            dist/${{ steps.vars.outputs.stem }}.zip.sha256
          if-no-files-found: ignore
          retention-days: 30

  # --- macOS store / DMG bundle ----------------------------------------
  # Builds a universal `rust2xml-gui.app`, signs it with the Developer
  # ID Application identity for a notarized DMG, and (if Apple API key
  # secrets are present) signs it again with the Apple Distribution
  # identity for a Mac App Store .pkg uploaded via altool /
  # iTMSTransporter.
  #
  # Gated on `secrets.MACOS_CERTIFICATE` — without certs the job is
  # skipped and the regular per-arch tarballs from the matrix build
  # remain the only macOS artefact.
  macos-store:
    name: macOS .app + DMG + App Store .pkg
    needs: test
    runs-on: macos-14
    if: ${{ vars.MACOS_STORE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: resolve version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"
          echo "version=$version"   >> "$GITHUB_OUTPUT"

      - name: build universal rust2xml-gui
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target aarch64-apple-darwin --bin rust2xml-gui
          cargo build --release --target x86_64-apple-darwin  --bin rust2xml-gui
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/rust2xml-gui \
            target/x86_64-apple-darwin/release/rust2xml-gui \
            -output target/release/rust2xml-gui-universal

      - name: assemble rust2xml-gui.app
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          app="target/release/rust2xml-gui.app"
          rm -rf "$app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp target/release/rust2xml-gui-universal "$app/Contents/MacOS/rust2xml-gui"
          chmod +x "$app/Contents/MacOS/rust2xml-gui"

          tmp_iconset="$(mktemp -d)/icon.iconset"
          mkdir -p "$tmp_iconset"
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" assets/icon.png \
              --out "$tmp_iconset/icon_${size}x${size}.png" >/dev/null
            dbl=$((size * 2))
            sips -z "$dbl" "$dbl" assets/icon.png \
              --out "$tmp_iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$tmp_iconset" -o "$app/Contents/Resources/icon.icns"

          sed "s/__VERSION__/${version}/g" assets/Info.plist.template \
            > "$app/Contents/Info.plist"

      - name: import signing certificates
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security list-keychains -d user -s build.keychain

          echo "$MACOS_CERTIFICATE" | base64 --decode > app_cert.p12
          security import app_cert.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          rm app_cert.p12

          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer_cert.p12
            security import installer_cert.p12 -k build.keychain \
              -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productbuild
            rm installer_cert.p12
          fi

          if [ -n "$MACOS_DEVELOPER_ID_CERTIFICATE" ]; then
            echo "$MACOS_DEVELOPER_ID_CERTIFICATE" | base64 --decode > devid_cert.p12
            security import devid_cert.p12 -k build.keychain \
              -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productbuild
            rm devid_cert.p12
          fi

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain
          security find-identity -v build.keychain

      - name: code-sign for DMG (Developer ID, optional)
        if: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE != '' }}
        run: |
          set -euo pipefail
          identity=$(security find-identity -v build.keychain \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -z "$identity" ]; then
            echo "WARNING: Developer ID secret was set but no matching identity loaded — DMG will be unsigned"
            exit 0
          fi
          codesign --force --options runtime \
            --sign "$identity" \
            --entitlements entitlements.plist \
            --deep \
            target/release/rust2xml-gui.app

      - name: create DMG
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          staging=$(mktemp -d)
          cp -R target/release/rust2xml-gui.app "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "rust2xml" \
            -srcfolder "$staging" \
            -ov -format UDZO \
            "rust2xml-${version}-macos-universal.dmg"
          rm -rf "$staging"

      - name: notarize DMG (only if Developer ID signed it)
        if: ${{ secrets.APPLE_API_KEY_P8 != '' && secrets.MACOS_DEVELOPER_ID_CERTIFICATE != '' }}
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          dmg="rust2xml-${version}-macos-universal.dmg"
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode \
            > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          xcrun notarytool submit "$dmg" \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$dmg"

      - name: upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: rust2xml-*-macos-universal.dmg
          if-no-files-found: ignore

      - name: build + sign + upload Mac App Store .pkg
        if: ${{ secrets.APPLE_API_KEY_P8 != '' && secrets.APPLE_TEAM_ID != '' }}
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          app="target/release/rust2xml-gui.app"

          # Substitute team ID into the App Store entitlements.
          sed "s/__APPLE_TEAM_ID__/${APPLE_TEAM_ID}/g" \
            entitlements-appstore.plist > entitlements-appstore-resolved.plist

          if [ -n "$MACOS_PROVISIONING_PROFILE" ]; then
            echo "$MACOS_PROVISIONING_PROFILE" | base64 --decode \
              > "$app/Contents/embedded.provisionprofile"
          fi

          app_identity=$(security find-identity -v build.keychain \
            | grep -E "Apple Distribution|3rd Party Mac Developer Application" \
            | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -z "$app_identity" ]; then
            echo "WARNING: no App Store signing identity, skipping .pkg"
            exit 0
          fi
          codesign --force --options runtime \
            --sign "$app_identity" \
            --entitlements entitlements-appstore-resolved.plist \
            --deep \
            "$app"

          installer_identity=$(security find-identity -v build.keychain \
            | grep -E "3rd Party Mac Developer Installer|Mac Installer Distribution" \
            | head -1 | sed 's/.*"\(.*\)"/\1/' || true)
          pkg="rust2xml-${version}-macos-appstore.pkg"
          if [ -n "$installer_identity" ]; then
            productbuild --component "$app" /Applications \
              --sign "$installer_identity" "$pkg"
          else
            productbuild --component "$app" /Applications "$pkg"
          fi

          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode \
            > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          transporter="/Applications/Transporter.app/Contents/itms/bin/iTMSTransporter"
          if [ -x "$transporter" ]; then
            "$transporter" -m upload \
              -f "$pkg" \
              -apiKey "$APPLE_API_KEY_ID" \
              -apiIssuer "$APPLE_API_ISSUER_ID" \
              || echo "WARNING: iTMSTransporter upload failed"
          else
            xcrun altool --upload-app \
              --file "$pkg" \
              --type macos \
              --apiKey "$APPLE_API_KEY_ID" \
              --apiIssuer "$APPLE_API_ISSUER_ID" \
              || echo "WARNING: altool upload failed"
          fi

      - name: upload App Store .pkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-appstore-pkg
          path: rust2xml-*-macos-appstore.pkg
          if-no-files-found: ignore

  # --- Windows MSIX (Microsoft Store) -----------------------------------
  # Packs the GUI binary into an MSIX using makeappx + AppxManifest.xml,
  # signs it (optional), and uploads it to Microsoft Store via the
  # devcenter REST API when MSSTORE_ENABLED + MSSTORE_APP_ID are set.
  windows-msix:
    name: Windows MSIX
    needs: test
    runs-on: windows-latest
    if: ${{ vars.MSSTORE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-msix

      - name: resolve version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: cargo build --release (rust2xml-gui)
        run: cargo build --release --bin rust2xml-gui

      - name: pack MSIX
        shell: pwsh
        run: |
          $version = "${{ steps.vars.outputs.version }}"
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\makeappx.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          if (-not $sdkBin) { Write-Error "makeappx.exe not found in Windows SDK"; exit 1 }
          $sdkDir = $sdkBin.DirectoryName

          $stage = "msix_staging"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target\release\rust2xml-gui.exe $stage\

          $manifest = Get-Content windows\AppxManifest.xml -Raw
          $manifest = $manifest -replace 'Version="1\.0\.0\.0"', "Version=`"${version}.0`""
          Set-Content -Path "$stage\AppxManifest.xml" -Value $manifest

          New-Item -ItemType Directory -Force -Path "$stage\assets" | Out-Null
          Copy-Item windows\assets\* "$stage\assets\"

          & "$sdkDir\makeappx.exe" pack /d $stage `
            /p "rust2xml-${version}-windows-x64.msix" /o

      - name: sign MSIX
        if: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $version = "${{ steps.vars.outputs.version }}"
          $sdkBin = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          & $sdkBin.FullName sign /fd SHA256 /a /f cert.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            "rust2xml-${version}-windows-x64.msix"
          Remove-Item cert.pfx

      - name: upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: rust2xml-*-windows-x64.msix
          if-no-files-found: ignore

      - name: submit to Microsoft Store
        if: ${{ vars.MSSTORE_APP_ID != '' && secrets.MSSTORE_TENANT_ID != '' }}
        shell: pwsh
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          MSSTORE_APP_ID: ${{ vars.MSSTORE_APP_ID }}
        run: |
          $msix = Get-ChildItem rust2xml-*-windows-x64.msix | Select-Object -First 1
          if (-not $msix) { Write-Error "No MSIX produced"; exit 1 }

          $tokenBody = @{
            grant_type    = "client_credentials"
            client_id     = $env:MSSTORE_CLIENT_ID
            client_secret = $env:MSSTORE_CLIENT_SECRET
            resource      = "https://manage.devcenter.microsoft.com"
          }
          $tokenResp = Invoke-RestMethod -Method Post `
            -Uri "https://login.microsoftonline.com/$($env:MSSTORE_TENANT_ID)/oauth2/token" `
            -Body $tokenBody
          $token = $tokenResp.access_token
          $headers = @{ Authorization = "Bearer $token"; "Content-Type" = "application/json" }
          $appId = $env:MSSTORE_APP_ID

          $appResp = Invoke-RestMethod -Method Get `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId" `
            -Headers $headers

          if ($appResp.pendingApplicationSubmission) {
            $pendingId = $appResp.pendingApplicationSubmission.id
            Write-Host "Deleting pending submission: $pendingId"
            Invoke-RestMethod -Method Delete `
              -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$pendingId" `
              -Headers $headers
            Start-Sleep -Seconds 2
          }

          $releaseNotes = "Generate XML and SQLite from Swiss public-domain drug data: Swissmedic, BAG, Refdata, Firstbase, Trustbox."
          $descriptionDe = "Generieren Sie Ihre Produktdaten aus oeffentlich zugaenglichen Schweizer Datenbanken: Swissmedic, BAG, Refdata, Firstbase, Trustbox. Open Source (GPL v3)."
          $descriptionEn = "Generate your product data from the Swiss Public Domain: Swissmedic, BAG, Refdata, Firstbase, Trustbox. Open Source (GPL v3)."

          $createBody = @{
            listings = @{
              "de-de" = @{
                baseListing = @{
                  title = "rust2xml"
                  description = $descriptionDe
                  releaseNotes = $releaseNotes
                  keywords = @("Schweizer", "Gesundheitswesen", "Public Domain", "Arzneimittel", "XML", "SQLite")
                  copyrightAndTrademarkInfo = "Copyright 2026 ywesee GmbH"
                  licenseTerms = "GNU General Public License v3.0"
                  privacyPolicy = "https://ywesee.com/Rust2Xml/Rust2Xml"
                  websiteUrl = "https://ywesee.com/Rust2Xml/Rust2Xml"
                  supportContact = "zdavatz@ywesee.com"
                  images = @()
                }
              }
              "en-us" = @{
                baseListing = @{
                  title = "rust2xml"
                  description = $descriptionEn
                  releaseNotes = $releaseNotes
                  keywords = @("Swiss", "Healthcare", "Public Domain", "Drug", "XML", "SQLite")
                  copyrightAndTrademarkInfo = "Copyright 2026 ywesee GmbH"
                  licenseTerms = "GNU General Public License v3.0"
                  privacyPolicy = "https://ywesee.com/Rust2Xml/Rust2Xml"
                  websiteUrl = "https://ywesee.com/Rust2Xml/Rust2Xml"
                  supportContact = "zdavatz@ywesee.com"
                  images = @()
                }
              }
            }
            pricing = @{
              trialPeriod = "NoFreeTrial"
              marketSpecificPricings = @{}
              sales = @()
              priceId = "Free"
            }
            applicationCategory = "BooksAndReference_EReader"
            allowTargetFutureDeviceFamilies = @{
              Desktop = $true; Mobile = $false; Xbox = $false; Holographic = $false
            }
            allowMicrosoftDecideAppAvailabilityToFutureDeviceFamilies = $true
            hardwarePreferences = @("Keyboard", "Mouse")
            hasExternalInAppProducts = $false
            meetAccessibilityGuidelines = $true
            canInstallOnRemovableMedia = $true
            automaticBackupEnabled = $true
            applicationPackages = @()
            notesForCertification = "Desktop utility that converts Swiss public-domain drug data into XML / SQLite. Requires internet access. No login. Contact: zdavatz@ywesee.com"
          } | ConvertTo-Json -Depth 10 -Compress

          $subResp = Invoke-RestMethod -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions" `
            -Headers $headers -Body $createBody `
            -ContentType "application/json; charset=utf-8"
          $subId = $subResp.id
          $uploadUrl = $subResp.fileUploadUrl

          $submission = $subResp
          $submission.targetPublishMode = "Immediate"
          $submission.targetPublishDate = ""
          $submission.visibility = "Public"
          if ($submission.applicationPackages) {
            foreach ($pkg in $submission.applicationPackages) {
              $pkg.fileStatus = "PendingDelete"
            }
          } else {
            $submission.applicationPackages = @()
          }
          $submission.applicationPackages += @{
            fileName = $msix.Name
            fileStatus = "PendingUpload"
            minimumDirectXVersion = "None"
            minimumSystemRam = "None"
          }
          $updateBody = $submission | ConvertTo-Json -Depth 20 -Compress
          Invoke-RestMethod -Method Put `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$subId" `
            -Headers $headers -Body $updateBody `
            -ContentType "application/json; charset=utf-8"

          $zipPath = [System.IO.Path]::Combine($env:TEMP, "upload.zip")
          Compress-Archive -Path $msix.FullName -DestinationPath $zipPath -Force
          $zipBytes = [System.IO.File]::ReadAllBytes($zipPath)
          Invoke-RestMethod -Method Put -Uri $uploadUrl `
            -Headers @{"x-ms-blob-type" = "BlockBlob"} `
            -Body $zipBytes -ContentType "application/octet-stream"

          Invoke-RestMethod -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$appId/submissions/$subId/commit" `
            -Headers $headers

  # --- Attach everything to a GitHub Release ----------------------------
  publish:
    name: publish release
    needs: [build, macos-store, windows-msix]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list staged artifacts
        run: ls -lh artifacts || true

      - name: resolve tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: rust2xml ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
            artifacts/*.dmg
            artifacts/*.msix
